<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/stylesheet.css">
    <title>Reisbureau</title>
</head>

<body>
    <header>
        <div class="container">
            <div class="header">
                <div class="logo">Reisbureau</div>
                <nav class="nav">
                    <a href="#">Home</a>
                    <a href="#">Reizen</a>
                    <a href="#">Over Ons</a>
                    <a href="#">Contact</a>
                </nav>
                <nav>
                    <a href="#" class="primary-btn">Inloggen</a>
                    <a href="#" class="secondary-btn">Account aanmaken</a>
                </nav>
            </div>
        </div>
    </header>
    <section class="hero">
        <div class="container">
            <h1>Ontdek de wereld met ons</h1>
            <p>Boek je volgende avontuur vandaag nog!</p>
            <a href="#" class="primary-btn">Bekijk Reizen</a>
        </div>
    </section>

    <section class="destinations">
        <div class="container">
            <h2>Populaire Bestemmingen</h2>
            <div class="destination-cards">
                <div class="card">
                    <img src="paris.jpg" alt="Parijs">
                    <h3>Parijs</h3>
                    <p>De stad van de liefde en licht.</p>
                </div>
                <div class="card">
                    <img src="bali.jpg" alt="Bali">
                    <h3>Bali</h3>
                    <p>Een tropisch paradijs in Indonesië.</p>
                </div>
                <div class="card">
                    <img src="newyork.jpg" alt="New York">
                    <h3>New York</h3>
                    <p>De stad die nooit slaapt.</p>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
